<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnLink Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #6a1b9a;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #6a1b9a;
            box-shadow: 0 0 0 2px rgba(106, 27, 154, 0.1);
        }

        button {
            background: #6a1b9a;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        button:hover {
            background: #8e24aa;
        }

        .delete-btn {
            background: #dc3545;
            padding: 6px 12px;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 10px 24px;
            background: #e0e0e0;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab.active {
            background: #6a1b9a;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .news-item, .paper-item {
            background: #f9f9f9;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border: 1px solid #eee;
        }

        .news-item:hover, .paper-item:hover {
            background: #f0f0f0;
        }

        .item-content {
            flex: 1;
        }

        .item-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 6px;
        }

        .item-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .item-content-text {
            font-size: 14px;
            color: #333;
        }

        .pinned-badge {
            background: #ffc107;
            color: #333;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 8px;
        }

        .category-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 8px;
        }

        .category-BURSARY { background: #28a745; color: white; }
        .category-DEADLINE { background: #dc3545; color: white; }
        .category-ANNOUNCEMENT { background: #ff9800; color: white; }
        .category-EVENT { background: #17a2b8; color: white; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
        }

        .status-online {
            background: #28a745;
            color: white;
        }

        .status-offline {
            background: #dc3545;
            color: white;
        }

        .refresh-btn {
            background: #6c757d;
            padding: 6px 12px;
            font-size: 12px;
            margin-left: 10px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        small {
            font-size: 12px;
            color: #666;
        }

        .link-preview {
            background: #e8f0fe;
            padding: 8px;
            border-radius: 6px;
            font-size: 12px;
            word-break: break-all;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-actions">
            <h1>
                🎓 LearnLink Admin Panel
                <span id="apiStatus" class="status-badge status-online">● Online</span>
            </h1>
            <button id="refreshStatusBtn" class="refresh-btn" onclick="checkAPIStatus()">🔄 Check Status</button>
        </div>
        
        <div id="messageContainer"></div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('news')">📰 Post News</div>
            <div class="tab" onclick="showTab('papers')">📚 Add Past Paper</div>
            <div class="tab" onclick="showTab('view')">👁️ View Data</div>
        </div>

        <!-- News Tab -->
        <div id="news-tab" class="tab-content active">
            <div class="card">
                <h2>Post New Announcement</h2>
                <form id="newsForm">
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="newsTitle" required placeholder="e.g., NSFAS Bursary Applications Open">
                    </div>
                    <div class="form-group">
                        <label>Content *</label>
                        <textarea id="newsContent" rows="4" required placeholder="Write your announcement here..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="newsCategory">
                            <option value="ANNOUNCEMENT">📢 Announcement</option>
                            <option value="BURSARY">💰 Bursary</option>
                            <option value="DEADLINE">⏰ Deadline</option>
                            <option value="EVENT">🎉 Event</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="newsDate">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="newsPinned"> 📌 Pin this post (shows at top)
                        </label>
                    </div>
                    <button type="submit">📢 Post Announcement</button>
                </form>
            </div>
        </div>

        <!-- Papers Tab with Download Link -->
        <div id="papers-tab" class="tab-content">
            <div class="card">
                <h2>Add Past Paper</h2>
                <form id="paperForm">
                    <div class="form-group">
                        <label>Subject *</label>
                        <select id="paperSubject" required>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physical Sciences">Physical Sciences</option>
                            <option value="English">English</option>
                            <option value="Life Sciences">Life Sciences</option>
                            <option value="History">History</option>
                            <option value="Geography">Geography</option>
                            <option value="Accounting">Accounting</option>
                            <option value="Business Studies">Business Studies</option>
                            <option value="Economics">Economics</option>
                            <option value="Information Technology">Information Technology</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Grade *</label>
                        <select id="paperGrade" required>
                            <option value="Grade 10">Grade 10</option>
                            <option value="Grade 11">Grade 11</option>
                            <option value="Grade 12">Grade 12</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year *</label>
                        <input type="number" id="paperYear" value="2025" min="2010" max="2026" required>
                    </div>
                    <div class="form-group">
                        <label>Title *</label>
                        <input type="text" id="paperTitle" required placeholder="e.g., Mathematics Paper 1">
                    </div>
                    <div class="form-group">
                        <label>Type *</label>
                        <select id="paperType" required>
                            <option value="Question Paper">Question Paper</option>
                            <option value="Memo">Memo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Download Link *</label>
                        <input type="url" id="paperLink" required placeholder="https://example.com/math-paper-2025.pdf">
                        <small>🔗 Paste the direct download link to the PDF (Google Drive, Dropbox, school website, etc.)</small>
                        <div id="linkPreview" class="link-preview" style="display: none;"></div>
                    </div>
                    <button type="submit">📄 Add Paper</button>
                </form>
            </div>
        </div>

        <!-- View Data Tab -->
        <div id="view-tab" class="tab-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>📰 Current News Posts</h2>
                    <button onclick="loadData()" style="background: #6c757d;">🔄 Refresh</button>
                </div>
                <div id="newsList">
                    <div class="loading">Loading news...</div>
                </div>
                
                <hr>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin: 20px 0;">
                    <h2>📚 Past Papers</h2>
                    <button onclick="loadData()" style="background: #6c757d;">🔄 Refresh</button>
                </div>
                <div id="papersList">
                    <div class="loading">Loading papers...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API URL - automatically detect from current location
        const API_URL = window.location.origin + '/api';

        // Link preview
        document.getElementById('paperLink').addEventListener('input', function() {
            const link = this.value;
            const previewDiv = document.getElementById('linkPreview');
            if (link && (link.startsWith('http://') || link.startsWith('https://'))) {
                previewDiv.style.display = 'block';
                previewDiv.innerHTML = `🔗 Will open: <a href="${link}" target="_blank">${link.substring(0, 60)}${link.length > 60 ? '...' : ''}</a>`;
            } else {
                previewDiv.style.display = 'none';
            }
        });

        // Check API status on load
        checkAPIStatus();
        loadData();

        async function checkAPIStatus() {
            try {
                const response = await fetch(`${API_URL}/news`);
                const statusSpan = document.getElementById('apiStatus');
                if (response.ok) {
                    statusSpan.textContent = '● Online';
                    statusSpan.className = 'status-badge status-online';
                } else {
                    statusSpan.textContent = '● Error';
                    statusSpan.className = 'status-badge status-offline';
                }
            } catch (error) {
                const statusSpan = document.getElementById('apiStatus');
                statusSpan.textContent = '● Offline';
                statusSpan.className = 'status-badge status-offline';
            }
        }

        function showMessage(text, isError = false) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="${isError ? 'error' : 'success'}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        function showTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(`${tabName}-tab`).classList.add('active');

            // Reload data if viewing
            if (tabName === 'view') {
                loadData();
            }
        }

        async function loadData() {
            await loadNews();
            await loadPapers();
        }

        async function loadNews() {
            const newsListDiv = document.getElementById('newsList');
            newsListDiv.innerHTML = '<div class="loading">Loading news...</div>';
            
            try {
                const response = await fetch(`${API_URL}/news`);
                const news = await response.json();
                
                if (news.length === 0) {
                    newsListDiv.innerHTML = '<div class="loading">No news posts yet. Create your first post above!</div>';
                    return;
                }
                
                newsListDiv.innerHTML = news.map(item => `
                    <div class="news-item">
                        <div class="item-content">
                            <div class="item-title">
                                ${escapeHtml(item.title)}
                                ${item.isPinned ? '<span class="pinned-badge">📌 PINNED</span>' : ''}
                                <span class="category-badge category-${item.category}">${item.category}</span>
                            </div>
                            <div class="item-meta">📅 ${item.date}</div>
                            <div class="item-content-text">${escapeHtml(item.content)}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteNews(${item.id})">🗑️ Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                newsListDiv.innerHTML = `<div class="error">Error loading news: ${error.message}</div>`;
            }
        }

        async function loadPapers() {
            const papersListDiv = document.getElementById('papersList');
            papersListDiv.innerHTML = '<div class="loading">Loading papers...</div>';
            
            try {
                const response = await fetch(`${API_URL}/papers`);
                const papers = await response.json();
                
                if (papers.length === 0) {
                    papersListDiv.innerHTML = '<div class="loading">No past papers yet. Add your first paper above!</div>';
                    return;
                }
                
                papersListDiv.innerHTML = papers.map(item => `
                    <div class="paper-item">
                        <div class="item-content">
                            <div class="item-title">${escapeHtml(item.title)}</div>
                            <div class="item-meta">
                                📚 ${item.subject} • ${item.grade} • ${item.year} • ${item.type}
                            </div>
                            ${item.download_link ? `<div class="item-meta" style="color: #0066cc;">🔗 <a href="${escapeHtml(item.download_link)}" target="_blank">${escapeHtml(item.download_link.substring(0, 50))}${item.download_link.length > 50 ? '...' : ''}</a></div>` : '<div class="item-meta" style="color: #ff9800;">⚠️ No download link provided</div>'}
                        </div>
                        <button class="delete-btn" onclick="deletePaper(${item.id})">🗑️ Delete</button>
                    </div>
                `).join('');
            } catch (error) {
                papersListDiv.innerHTML = `<div class="error">Error loading papers: ${error.message}</div>`;
            }
        }

        async function deleteNews(id) {
            if (!confirm('Are you sure you want to delete this news post?')) return;
            
            try {
                const response = await fetch(`${API_URL}/news/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showMessage('News deleted successfully!');
                    loadNews();
                } else {
                    showMessage('Failed to delete news', true);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        async function deletePaper(id) {
            if (!confirm('Are you sure you want to delete this past paper?')) return;
            
            try {
                const response = await fetch(`${API_URL}/papers/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showMessage('Paper deleted successfully!');
                    loadPapers();
                } else {
                    showMessage('Failed to delete paper', true);
                }
            } catch (error) {
                showMessage('Error: ' + error.message, true);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // News Form Submission
        document.getElementById('newsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('newsTitle').value.trim(),
                content: document.getElementById('newsContent').value.trim(),
                category: document.getElementById('newsCategory').value,
                date: document.getElementById('newsDate').value || new Date().toISOString().split('T')[0],
                isPinned: document.getElementById('newsPinned').checked ? 1 : 0
            };

            if (!formData.title || !formData.content) {
                showMessage('Please fill in both title and content', true);
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Posting...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/news`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showMessage('✅ News posted successfully!');
                    document.getElementById('newsForm').reset();
                    document.getElementById('newsDate').value = new Date().toISOString().split('T')[0];
                    loadNews();
                } else {
                    showMessage('❌ Failed to post: ' + (result.error || 'Unknown error'), true);
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, true);
            } finally {
                submitBtn.textContent = '📢 Post Announcement';
                submitBtn.disabled = false;
            }
        });

        // Paper Form Submission with Download Link
        document.getElementById('paperForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const downloadLink = document.getElementById('paperLink').value.trim();
            
            // Validate URL
            if (!downloadLink.startsWith('http://') && !downloadLink.startsWith('https://')) {
                showMessage('❌ Please enter a valid URL starting with http:// or https://', true);
                return;
            }
            
            const formData = {
                subject: document.getElementById('paperSubject').value,
                grade: document.getElementById('paperGrade').value,
                year: parseInt(document.getElementById('paperYear').value),
                title: document.getElementById('paperTitle').value.trim(),
                type: document.getElementById('paperType').value,
                download_link: downloadLink
            };

            if (!formData.title) {
                showMessage('Please enter a title for the paper', true);
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.textContent = 'Adding...';
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/papers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    showMessage('✅ Paper added successfully!');
                    document.getElementById('paperForm').reset();
                    document.getElementById('paperYear').value = '2025';
                    document.getElementById('linkPreview').style.display = 'none';
                    loadPapers();
                } else {
                    showMessage('❌ Failed to add paper: ' + (result.error || 'Unknown error'), true);
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, true);
            } finally {
                submitBtn.textContent = '📄 Add Paper';
                submitBtn.disabled = false;
            }
        });

        // Set default date
        document.getElementById('newsDate').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
